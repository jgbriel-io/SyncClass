version: "3.8"
services:
  web:
    build: .
    ports:
      - "3000:80"
    environment:
      NODE_ENV: production
    restart: unless-stopped

# Optional: if you want to run Supabase locally with docker-compose,
# keep using the Supabase CLI (`supabase start`) or add a dedicated
# supabase service here. The CLI uses several images and is easier
# to manage during development.
