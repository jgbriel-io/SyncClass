name: CI/CD Pipeline

on:
  push:
    branches: [main, dev, homolog]
  pull_request:
    branches: [main, dev, homolog]

jobs:
  quality-check:
    name: Code Quality & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm run test
        env:
          TZ: America/Sao_Paulo
          VITE_SUPABASE_URL: https://fake-project.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: fake-anon-key-for-ci-tests

      - name: Build (verify compilation)
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://fake-project.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: fake-anon-key-for-ci-tests

      - name: Check build size
        run: |
          du -sh dist/
          du -h dist/assets/*.js | sort -h | tail -10

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=syncclass --branch=main
